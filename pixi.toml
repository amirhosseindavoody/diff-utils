[workspace]
name = "diff-utils"
version = "2026.6.30+3"
description = "Side-by-side file diff TUI written in Rust"
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[package]
name = "diff-utils"
version = "2026.6.30+3"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.*" }

[feature.dev.dependencies]
rust = ">=1.96.0,<1.97"

[feature.test.dependencies]
diff-utils = { path = "." }

[tasks]
build = "cargo build --release"
diff = "cargo run --release -p diff-utils --"
test = "cargo test"
conda-package = "pixi publish --target-dir dist"
update-version = "scripts/update-version.sh"

[environments]
default = { features = ["dev"] }
test = { features = ["test"] }
