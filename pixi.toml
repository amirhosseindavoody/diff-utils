[workspace]
name = "diff-tool"
version = "2026.7.1+0"
description = "Side-by-side file diff TUI written in Rust"
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[package]
name = "diff-tool"
version = "2026.7.1+0"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "0.*" }

[feature.dev.dependencies]
rust = ">=1.96.0,<1.97"

[feature.demo.dependencies]
ffmpeg = ">=7,<9"
ttyd = ">=1.7"
vhs = ">=0.11"

[feature.test.dependencies]
diff-tool = { path = "." }

[tasks]
build = "cargo build --release"
diff = "cargo run --release -p diff-tool --"
test = "cargo test"
demo-video = { cmd = "bash demo/render-demo.sh", depends-on = ["build"] }
conda-package = "pixi publish --target-dir dist"
update-version = "scripts/update-version.sh"

[environments]
default = { features = ["dev", "demo"] }
test = { features = ["test"] }
